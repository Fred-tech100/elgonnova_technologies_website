{% extends 'dashboard/base_dashboard.html' %}

{% block dashboard_content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Site Settings</h1>
</div>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-6">
            <div class="card bg-dark text-white mb-3">
                <div class="card-header">
                    <h5>General Settings</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Site Name</label>
                        <input type="text" name="site_name" value="{{ settings.site_name }}" class="form-control bg-dark text-white">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Site Logo</label>
                        <input type="file" name="site_logo" class="form-control bg-dark text-white">
                        {% if settings.site_logo %}
                            <small>Current: {{ settings.site_logo.name }}</small>
                        {% endif %}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Favicon</label>
                        <input type="file" name="site_favicon" class="form-control bg-dark text-white">
                    </div>
                </div>
            </div>
            
            <div class="card bg-dark text-white mb-3">
                <div class="card-header">
                    <h5>Contact Information</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" value="{{ settings.email }}" class="form-control bg-dark text-white">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" value="{{ settings.phone }}" class="form-control bg-dark text-white">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address" rows="3" class="form-control bg-dark text-white">{{ settings.address }}</textarea>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card bg-dark text-white mb-3">
                <div class="card-header">
                    <h5>Social Media Links</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">Facebook</label>
                        <input type="url" name="facebook" value="{{ settings.facebook }}" class="form-control bg-dark text-white">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Twitter</label>
                        <input type="url" name="twitter" value="{{ settings.twitter }}" class="form-control bg-dark text-white">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">LinkedIn</label>
                        <input type="url" name="linkedin" value="{{ settings.linkedin }}" class="form-control bg-dark text-white">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Instagram</label>
                        <input type="url" name="instagram" value="{{ settings.instagram }}" class="form-control bg-dark text-white">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">GitHub</label>
                        <input type="url" name="github" value="{{ settings.github }}" class="form-control bg-dark text-white">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="text-end">
        <button type="submit" class="btn btn-primary">Save Settings</button>
    </div>
</form>
{% endblock %}
