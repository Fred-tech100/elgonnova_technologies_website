{% extends 'dashboard/base_dashboard.html' %}

{% block dashboard_content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Add New Post</h1>
</div>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="row">
        <div class="col-md-8">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control bg-dark text-white" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Slug</label>
                <input type="text" name="slug" class="form-control bg-dark text-white" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-control bg-dark text-white" required>
                    <option value="AI & ML">AI & Machine Learning</option>
                    <option value="IoT">Internet of Things</option>
                    <option value="Business">Business & Digital Transformation</option>
                    <option value="Tech News">Technology News</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Excerpt</label>
                <textarea name="excerpt" rows="3" class="form-control bg-dark text-white" required></textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Content</label>
                <textarea name="content" rows="10" class="form-control bg-dark text-white" required></textarea>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="mb-3">
                <label class="form-label">Icon (Emoji)</label>
                <input type="text" name="icon" class="form-control bg-dark text-white" placeholder="🤖" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Featured Image</label>
                <input type="file" name="featured_image" class="form-control bg-dark text-white">
            </div>
            
            <div class="mb-3">
                <div class="form-check">
                    <input type="checkbox" name="is_published" class="form-check-input">
                    <label class="form-check-label">Publish immediately</label>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary">Save Post</button>
            <a href="{% url 'dashboard_posts' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </div>
</form>
{% endblock %}
