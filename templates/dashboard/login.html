{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Login | ElgonNova</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0F0F0F 0%, #1E1E1E 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #1E1E1E;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,107,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-mark img{
            width: 60px;
            height: 60px;
            {% comment %} background: linear-gradient(135deg, #FF6B00, #00AEEF); {% endcomment %}
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            {% comment %} font-size: 24px;
            font-weight: 900;
            color: white; {% endcomment %}
        }
        .form-control {
            background: #2A2A2A;
            border: 1px solid #3A3A3A;
            color: white;
            padding: 12px;
        }
        .form-control:focus {
            background: #2A2A2A;
            border-color: #FF6B00;
            color: white;
            box-shadow: none;
        }
        .btn-login {
            background: #FF6B00;
            border: none;
            padding: 12px;
            font-weight: 600;
            width: 100%;
        }
        .btn-login:hover {
            background: #FF8C33;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-mark"><img src="{% static 'images/elgonnova_logo.png' %}" alt="ElgonNova Logo"></div>
            <h3 style="color: white; margin-top: 15px;">Dashboard Login</h3>
        </div>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label text-white">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-white">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-login text-white">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        <div class="text-center mt-3">
            <a href="/" class="text-white-50" style="text-decoration: none;">← Back to Website</a>
        </div>
    </div>
</body>
</html>
